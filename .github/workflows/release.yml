name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-amd64:
    name: Build for Linux AMD64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcap-dev

      - name: Build binary
        run: |
          go build -o traffic-monitor main.go
          tar -czf traffic-monitor-${{ github.ref_name }}-linux-amd64.tar.gz traffic-monitor

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: traffic-monitor-linux-amd64
          path: traffic-monitor-${{ github.ref_name }}-linux-amd64.tar.gz

  release:
    name: Create Release
    needs: [build-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Quick Install (AMD64 only)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/xiaoxinmm/linux-traffic-monitor/main/install.sh | sudo bash
            ```

            ### Manual Download
            Download the precompiled binary for Linux AMD64 below.

            ### ARM/ARM64 Users
            For ARM architectures, please build from source:
            ```bash
            git clone https://github.com/xiaoxinmm/linux-traffic-monitor.git
            cd linux-traffic-monitor
            go build -o traffic-monitor main.go
            sudo ./traffic-monitor
            ```

            ## What's Changed
            See the full changelog below.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
